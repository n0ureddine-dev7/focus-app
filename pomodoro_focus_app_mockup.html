<div style="background: var(--surface-1); border-radius: 16px; padding: 1.5rem; max-width: 320px; margin: 0 auto;">
  <div style="text-align: center; margin-bottom: 1rem;">
    <span style="display: inline-block; background: var(--bg-danger); color: var(--text-danger); font-size: 13px; font-weight: 500; padding: 4px 16px; border-radius: 20px; letter-spacing: 0.5px;">FOCUS</span>
  </div>

  <div style="position: relative; width: 220px; height: 220px; margin: 0 auto 1.25rem;">
    <svg viewBox="0 0 220 220" style="width: 100%; height: 100%;">
      <circle cx="110" cy="110" r="100" fill="none" stroke="var(--border)" stroke-width="10"/>
      <circle cx="110" cy="110" r="100" fill="none" stroke="#D85A30" stroke-width="10" stroke-linecap="round" stroke-dasharray="628" stroke-dashoffset="160" transform="rotate(-90 110 110)"/>
    </svg>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center;">
      <div style="font-size: 48px; font-weight: 500; font-variant-numeric: tabular-nums; color: var(--text-primary);">19:42</div>
      <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">Session 1 of 4</div>
    </div>
  </div>

  <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 1rem;">
    <button style="flex: 1; height: 48px; border-radius: 12px; border: none; background: #D85A30; color: white; font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px;"><i class="ti ti-player-pause"></i> Pause</button>
    <button style="width: 48px; height: 48px; border-radius: 12px; border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-secondary); display: flex; align-items: center; justify-content: center;" aria-label="Reset"><i class="ti ti-refresh"></i></button>
    <button style="width: 48px; height: 48px; border-radius: 12px; border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-secondary); display: flex; align-items: center; justify-content: center;" aria-label="Skip"><i class="ti ti-player-skip-forward"></i></button>
  </div>

  <div style="display: flex; align-items: center; justify-content: space-between; padding-top: 0.75rem; border-top: 0.5px solid var(--border);">
    <div style="font-size: 13px; color: var(--text-secondary);"><i class="ti ti-flame" style="color: #D85A30; vertical-align: -2px;"></i> 3 completed</div>
    <button style="background: none; border: none; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; font-size: 13px;"><i class="ti ti-settings"></i> Settings</button>
  </div>
</div>
